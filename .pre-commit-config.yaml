repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.0
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/.*\.py$
      - id: ruff-format
        files: ^backend/.*\.py$
  - repo: local
    hooks:
      - id: frontend-lint
        name: Frontend ESLint
        entry: bash -c 'cd frontend && npm run lint'
        language: node
        types: [file]
        files: ^frontend/(?!\.next/).*\.(js|jsx|ts|tsx)$
        pass_filenames: false
        always_run: false
        stages: [pre-commit]