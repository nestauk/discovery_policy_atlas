name: Initial Deploy Environment

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Environment to deploy (staging, prod)"
        required: true
        default: "staging"
      platform:
        description: "Choose to deploy either Supabase or the application itself."
        required: true
        default: "application"
      aws_region:
        description: "AWS region to deploy to"
        required: true
        default: "eu-west-2"
permissions:
  contents: read
  id-token: write
jobs:
    deploy-supabase:
      if: ${{ github.event.inputs.platform == 'supabase' }}
      environment: ${{ github.event.inputs.env }}
      runs-on: ubuntu-latest
      steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install AWS CDK (global)
        run: npm install -g aws-cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ github.event.inputs.aws_region }}

      - name: Deploy with CDK
        run: |
          cd infra
          cdk deploy SupabaseStack-${{ github.event.inputs.env }} \
            -c env_name=${{ github.event.inputs.env }} \
            --require-approval never
    deploy-application:
      if: ${{ github.event.inputs.platform == 'application' }}
      environment: ${{ github.event.inputs.env }}
      runs-on: ubuntu-latest
      steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install AWS CDK (global)
        run: npm install -g aws-cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ github.event.inputs.aws_region }}

      - name: Deploy with CDK
        run: |
          cd infra
          cdk deploy PolicyAtlasStack-${{ github.event.inputs.env }} \
            -c env_name=${{ github.event.inputs.env }} \
            --require-approval never