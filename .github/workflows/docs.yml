name: Deploy Documentation

on:
  push:
    branches: [ dev, create_docs ]
  pull_request:
    branches: [ dev ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install uv
      uses: astral-sh/setup-uv@v1
      with:
        version: "latest"
    
    - name: Install dependencies
      run: |
        cd backend
        uv sync
    
    - name: Build documentation
      run: |
        cd backend
        uv run mkdocs build --config-file ../mkdocs.yml --site-dir ../site
    
    - name: Copy CNAME file
      run: |
        cp docs/CNAME site/CNAME
    
    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/create_docs'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./site
        cname: your-domain.com  # Optional: if you have a custom domain 