name: Deploy Documentation

on:
  push:
    branches: [ dev, create_docs ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install uv
      uses: astral-sh/setup-uv@v1
      with:
        version: "latest"
    
    - name: Install dependencies
      run: |
        cd backend
        uv sync
    
    - name: Build documentation
      run: |
        cd backend
        uv run mkdocs build --config-file ../mkdocs.yml --site-dir site
    
    - name: Debug site directory
      run: |
        echo "Current directory: $(pwd)"
        echo "Contents of backend/site:"
        ls -la backend/site/
    
    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/create_docs'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: backend/site 