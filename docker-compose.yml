# docker-compose.yml
services:
  postgres:
    image: postgres:15
    container_name: policy_atlas_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: policy_atlas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: policy_atlas_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: