# Local development services for Policy Atlas.
#
# Provides PostgreSQL (with pgvector), PostgREST, and an nginx proxy that
# rewrites /rest/v1/* paths so the Supabase Python SDK works unchanged.
#
# Usage:
#   docker compose up -d
#
# Then run frontend/backend natively:
#   cd backend && uv run python main.py        # http://localhost:8000
#   cd frontend && npm run dev                  # http://localhost:3000
#
# Backend .env values for local development:
#   SUPABASE_URL=http://localhost:54321
#   SUPABASE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
#
# The JWT above is signed with the dev-only secret below and carries
# role=service_role.  Never use these credentials outside local dev.

services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: policy_atlas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh
      - ./backend/supabase/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgrest:
    image: postgrest/postgrest:v12.2.3
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgresql://authenticator:authenticator@postgres:5432/policy_atlas
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_SERVER_PORT: "3000"
      PGRST_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long

  postgrest-proxy:
    image: nginx:alpine
    depends_on:
      - postgrest
    ports:
      - "54321:8000"
    volumes:
      - ./docker/postgrest-proxy/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  pgdata:
