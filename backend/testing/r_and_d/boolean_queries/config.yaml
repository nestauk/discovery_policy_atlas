    - gpt-4o-mini
    - gpt-4.1
    - gpt-4.1-mini
    - gpt-4.1-nano
    - gpt-5
    - gpt-5-mini
    - gpt-5-nano

prompts:
    - policy_atlas_v1
    - policy_atlas_v2
    