    - 0.5
    - 1
    - 1.5

models:
    - gpt-4.1-mini    
    - gpt-4.1
    - gpt-5-nano    
    - gpt-5-mini    
    - gpt-5

prompts:
    - wang_et_al_q2_prompt
    - wang_et_al_q3_prompt
    