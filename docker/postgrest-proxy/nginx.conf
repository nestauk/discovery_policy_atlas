worker_processes 1;
events { worker_connections 128; }

http {
    server {
        listen 8000;

        # Bulk inserts (e.g. synthesis_themes assignments) can exceed nginx's
        # default 1M client_max_body_size, producing 413 Request Entity Too
        # Large. Match Supabase Cloud's default.
        client_max_body_size 50m;

        # Health check
        location /health {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # Supabase SDK sends requests to /rest/v1/*
        # PostgREST serves at / — rewrite the prefix away.
        location /rest/v1/ {
            rewrite ^/rest/v1/(.*) /$1 break;
            proxy_pass http://postgrest:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_request_headers on;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;

            # PostgREST echoes the query path in the Content-Location response
            # header. For large `id=in.(...)` filters this header alone can
            # exceed nginx's default 4K proxy_buffer_size and cause 502s.
            proxy_buffer_size 32k;
            proxy_buffers 8 32k;
            proxy_busy_buffers_size 64k;
        }

        location / {
            return 404;
        }
    }
}
