repos:
  - repo: local
    hooks:
      - id: frontend-lint
        name: Frontend ESLint
        entry: bash -c 'npm run lint'
        language: node
        types: [file]
        files: ^(app|components|lib|__tests__|public|proxy\.ts|vitest\.config\.ts|vitest\.setup\.ts).*(\.js|\.jsx|\.ts|\.tsx)$
        pass_filenames: true
        always_run: false
        stages: [pre-commit]